services:
  nous-proxy:
    build: .
    container_name: nous-proxy
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
